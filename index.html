<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어 단어 모험 🚀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Gowun+Dodum&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF3DC;
    --bg-soft: #FFFAEE;
    --primary: #FF8C42;
    --primary-dark: #E56B1F;
    --accent: #2EC4B6;
    --accent-dark: #1AA294;
    --pink: #FF6F91;
    --purple: #845EC2;
    --yellow: #FFC857;
    --navy: #2A3558;
    --navy-soft: #4A5A85;
    --success: #4CAF50;
    --danger: #F44336;
    --shadow: 0 6px 0 rgba(42, 53, 88, 0.15);
    --shadow-deep: 0 10px 30px rgba(42, 53, 88, 0.15);
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Quicksand', 'Gowun Dodum', sans-serif;
    background:
      radial-gradient(circle at 20% 10%, rgba(46, 196, 182, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(255, 111, 145, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(255, 200, 87, 0.1) 0%, transparent 50%),
      var(--bg);
    color: var(--navy);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    background: white;
    border-radius: var(--radius);
    padding: 14px 20px;
    box-shadow: var(--shadow);
    border: 3px solid var(--navy);
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--yellow), var(--primary));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    border: 3px solid var(--navy);
    flex-shrink: 0;
  }

  .user-info { flex: 1; min-width: 140px; }
  .user-name {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: var(--navy);
    line-height: 1.1;
  }
  .user-level {
    font-size: 13px;
    color: var(--navy-soft);
    font-weight: 600;
    font-family: 'Gowun Dodum';
  }

  .xp-container {
    flex: 2;
    min-width: 180px;
  }
  .xp-bar {
    height: 14px;
    background: #F0E4CC;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid var(--navy);
    position: relative;
  }
  .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #5DD9CD);
    width: 0%;
    transition: width 0.8s cubic-bezier(.68,-0.55,.265,1.55);
    border-radius: 8px 0 0 8px;
  }
  .xp-text {
    font-size: 12px;
    font-family: 'Fredoka';
    font-weight: 600;
    color: var(--navy-soft);
    margin-top: 4px;
  }

  .streak {
    display: flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #FFE5B4, var(--yellow));
    padding: 8px 14px;
    border-radius: 14px;
    border: 2px solid var(--navy);
    font-family: 'Fredoka';
    font-weight: 600;
  }

  .sound-toggle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: white;
    border: 2px solid var(--navy);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    box-shadow: 0 3px 0 var(--navy);
    padding: 0;
  }
  .sound-toggle:hover { transform: translateY(-2px); box-shadow: 0 5px 0 var(--navy); }
  .sound-toggle:active { transform: translateY(1px); box-shadow: 0 2px 0 var(--navy); }

  /* CARD */
  .card {
    background: white;
    border-radius: var(--radius);
    padding: 28px 24px;
    box-shadow: var(--shadow-deep);
    border: 3px solid var(--navy);
    animation: cardIn 0.5s cubic-bezier(.68,-0.55,.265,1.55);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .screen-title {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--navy);
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .screen-sub {
    font-family: 'Gowun Dodum';
    color: var(--navy-soft);
    font-size: 15px;
    margin-bottom: 20px;
  }

  /* BUTTONS */
  .btn {
    font-family: 'Fredoka', 'Gowun Dodum', sans-serif;
    font-weight: 600;
    font-size: 16px;
    padding: 14px 22px;
    border-radius: 16px;
    border: 3px solid var(--navy);
    cursor: pointer;
    transition: all 0.15s ease;
    background: white;
    color: var(--navy);
    box-shadow: 0 5px 0 var(--navy);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    user-select: none;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 7px 0 var(--navy); }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--navy); }

  .btn-primary { background: var(--primary); color: white; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-pink { background: var(--pink); color: white; }
  .btn-purple { background: var(--purple); color: white; }
  .btn-yellow { background: var(--yellow); color: var(--navy); }
  .btn-ghost { background: transparent; box-shadow: none; border-color: transparent; }
  .btn-ghost:hover { box-shadow: none; background: rgba(42, 53, 88, 0.08); }
  .btn-sm { font-size: 14px; padding: 10px 16px; box-shadow: 0 4px 0 var(--navy); }
  .btn-sm:active { box-shadow: 0 1px 0 var(--navy); }
  .btn-lg { font-size: 20px; padding: 18px 30px; }

  /* NAME INPUT */
  .welcome {
    text-align: center;
    padding: 40px 20px;
  }
  .welcome-emoji {
    font-size: 80px;
    margin-bottom: 12px;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .welcome h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 8px;
    text-shadow: 3px 3px 0 var(--navy);
    letter-spacing: -1px;
  }
  .welcome p {
    font-family: 'Gowun Dodum';
    color: var(--navy-soft);
    font-size: 17px;
    margin-bottom: 24px;
  }
  .name-input {
    width: 100%;
    max-width: 300px;
    padding: 14px 18px;
    font-size: 18px;
    font-family: 'Gowun Dodum';
    border: 3px solid var(--navy);
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 4px 0 var(--navy);
    outline: none;
    transition: all 0.2s;
  }
  .name-input:focus { transform: translateY(-2px); box-shadow: 0 6px 0 var(--navy); }

  /* CATEGORY GRID */
  .categories {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
    margin-top: 20px;
  }

  .cat-card {
    background: white;
    border: 3px solid var(--navy);
    border-radius: 18px;
    padding: 18px 14px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 5px 0 var(--navy);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .cat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 0 var(--navy); }
  .cat-card:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--navy); }
  .cat-emoji {
    font-size: 42px;
    display: block;
    margin-bottom: 6px;
    line-height: 1;
  }
  .cat-name {
    font-family: 'Fredoka';
    font-weight: 600;
    font-size: 17px;
    color: var(--navy);
    margin-bottom: 2px;
  }
  .cat-name-kr {
    font-family: 'Gowun Dodum';
    font-size: 12px;
    color: var(--navy-soft);
    margin-bottom: 8px;
  }
  .cat-progress {
    height: 6px;
    background: #F0E4CC;
    border-radius: 6px;
    overflow: hidden;
  }
  .cat-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 6px;
    transition: width 0.5s;
  }
  .cat-progress-text {
    font-size: 11px;
    color: var(--navy-soft);
    margin-top: 4px;
    font-weight: 600;
    font-family: 'Fredoka';
  }

  /* MODE SELECT */
  .modes {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-top: 20px;
  }
  .mode-card {
    background: white;
    border: 3px solid var(--navy);
    border-radius: 18px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 5px 0 var(--navy);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .mode-card:hover { transform: translateY(-3px); box-shadow: 0 8px 0 var(--navy); }
  .mode-card:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--navy); }
  .mode-icon {
    width: 50px;
    height: 50px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    border: 3px solid var(--navy);
  }
  .mode-title {
    font-family: 'Fredoka';
    font-weight: 600;
    font-size: 16px;
    color: var(--navy);
    line-height: 1.2;
  }
  .mode-desc {
    font-family: 'Gowun Dodum';
    font-size: 12px;
    color: var(--navy-soft);
    margin-top: 3px;
  }

  /* GAME AREA */
  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .progress-pill {
    background: white;
    padding: 8px 14px;
    border-radius: 12px;
    border: 3px solid var(--navy);
    font-family: 'Fredoka';
    font-weight: 600;
    font-size: 14px;
    box-shadow: 0 3px 0 var(--navy);
  }

  /* FLASHCARD */
  .flash {
    perspective: 1500px;
    margin: 30px auto;
    max-width: 400px;
    height: 320px;
  }
  .flash-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.7s cubic-bezier(.68,-0.55,.265,1.55);
    transform-style: preserve-3d;
    cursor: pointer;
  }
  .flash.flipped .flash-inner { transform: rotateY(180deg); }
  .flash-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 24px;
    border: 4px solid var(--navy);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-shadow: 0 8px 0 var(--navy);
  }
  .flash-front {
    background: linear-gradient(135deg, #FFE5B4, var(--yellow));
  }
  .flash-back {
    background: linear-gradient(135deg, #B2F5EA, var(--accent));
    transform: rotateY(180deg);
  }
  .flash-word {
    font-family: 'Fredoka';
    font-weight: 700;
    font-size: 54px;
    color: var(--navy);
    letter-spacing: -1px;
    text-align: center;
    line-height: 1.1;
  }
  .flash-mean {
    font-family: 'Gowun Dodum';
    font-size: 28px;
    color: white;
    font-weight: 600;
    text-align: center;
    text-shadow: 2px 2px 0 var(--navy);
  }
  .flash-hint {
    font-family: 'Gowun Dodum';
    font-size: 13px;
    color: var(--navy-soft);
    margin-top: 16px;
  }
  .speak-btn {
    background: white;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 3px solid var(--navy);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    margin-top: 16px;
    box-shadow: 0 3px 0 var(--navy);
    transition: all 0.15s;
  }
  .speak-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 0 var(--navy); }
  .speak-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--navy); }

  /* QUIZ */
  .quiz-question {
    text-align: center;
    padding: 40px 20px 20px;
    background: linear-gradient(135deg, #FFE5B4, var(--yellow));
    border-radius: 24px;
    border: 4px solid var(--navy);
    margin-bottom: 20px;
    box-shadow: 0 6px 0 var(--navy);
  }
  .quiz-label {
    font-family: 'Gowun Dodum';
    font-size: 13px;
    color: var(--navy-soft);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .quiz-word {
    font-family: 'Fredoka';
    font-weight: 700;
    font-size: 48px;
    color: var(--navy);
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .quiz-word-kr {
    font-family: 'Gowun Dodum';
    font-weight: 700;
    font-size: 38px;
    color: var(--navy);
    line-height: 1.2;
  }
  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 500px) {
    .quiz-options { grid-template-columns: 1fr; }
    .quiz-word { font-size: 36px; }
    .quiz-word-kr { font-size: 28px; }
    .flash-word { font-size: 40px; }
  }
  .quiz-option {
    background: white;
    border: 3px solid var(--navy);
    border-radius: 16px;
    padding: 16px;
    cursor: pointer;
    font-family: 'Gowun Dodum';
    font-size: 18px;
    font-weight: 600;
    color: var(--navy);
    box-shadow: 0 4px 0 var(--navy);
    transition: all 0.15s;
    text-align: center;
  }
  .quiz-option:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--navy); }
  .quiz-option:active:not(.correct):not(.wrong) { transform: translateY(2px); box-shadow: 0 1px 0 var(--navy); }
  .quiz-option.correct {
    background: var(--success);
    color: white;
    animation: pulse 0.5s;
  }
  .quiz-option.wrong {
    background: var(--danger);
    color: white;
    animation: shake 0.5s;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* SPELLING */
  .spell-display {
    text-align: center;
    background: linear-gradient(135deg, #E6D8FC, var(--purple));
    padding: 30px 20px;
    border-radius: 24px;
    border: 4px solid var(--navy);
    margin-bottom: 20px;
    box-shadow: 0 6px 0 var(--navy);
  }
  .spell-mean {
    font-family: 'Gowun Dodum';
    font-weight: 700;
    font-size: 38px;
    color: white;
    text-shadow: 3px 3px 0 var(--navy);
    margin-bottom: 14px;
  }
  .spell-hint {
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .spell-slot {
    width: 32px;
    height: 40px;
    background: white;
    border: 2px solid var(--navy);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka';
    font-weight: 700;
    font-size: 22px;
    color: var(--primary);
  }
  .spell-slot.space { background: transparent; border: none; width: 16px; }
  .spell-input {
    width: 100%;
    padding: 16px;
    font-size: 24px;
    font-family: 'Fredoka';
    font-weight: 600;
    border: 3px solid var(--navy);
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 5px 0 var(--navy);
    outline: none;
    text-transform: lowercase;
    color: var(--navy);
  }
  .spell-input:focus { transform: translateY(-2px); box-shadow: 0 7px 0 var(--navy); }
  .spell-input.correct { background: #E8F5E9; border-color: var(--success); }
  .spell-input.wrong { background: #FFEBEE; border-color: var(--danger); animation: shake 0.5s; }

  /* MATCHING */
  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }
  .match-tile {
    background: white;
    border: 3px solid var(--navy);
    border-radius: 14px;
    padding: 14px 10px;
    cursor: pointer;
    text-align: center;
    font-weight: 600;
    color: var(--navy);
    box-shadow: 0 4px 0 var(--navy);
    transition: all 0.15s;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .match-tile.eng { font-family: 'Fredoka'; font-size: 18px; }
  .match-tile.kor { font-family: 'Gowun Dodum'; font-size: 16px; }
  .match-tile:hover:not(.matched):not(.selected) { transform: translateY(-2px); box-shadow: 0 6px 0 var(--navy); }
  .match-tile.selected { background: var(--yellow); transform: translateY(2px); box-shadow: 0 1px 0 var(--navy); }
  .match-tile.matched { background: var(--success); color: white; opacity: 0.6; cursor: default; border-color: var(--success); box-shadow: 0 3px 0 #2E7D32; }
  .match-tile.wrong-match { background: var(--danger); color: white; animation: shake 0.4s; }

  /* FEEDBACK */
  .feedback {
    text-align: center;
    padding: 20px;
    margin: 16px 0;
    border-radius: 16px;
    font-family: 'Fredoka';
    font-weight: 600;
    font-size: 18px;
    border: 3px solid var(--navy);
    animation: cardIn 0.3s;
  }
  .feedback.correct { background: #C8E6C9; color: var(--success); }
  .feedback.wrong { background: #FFCDD2; color: var(--danger); }

  /* RESULTS */
  .result-hero {
    text-align: center;
    padding: 30px 20px;
  }
  .result-emoji {
    font-size: 100px;
    margin-bottom: 10px;
    animation: bounce 2s ease-in-out infinite;
  }
  .result-title {
    font-family: 'Fredoka';
    font-weight: 700;
    font-size: 36px;
    color: var(--primary);
    text-shadow: 3px 3px 0 var(--navy);
    margin-bottom: 6px;
    line-height: 1.1;
  }
  .result-sub {
    font-family: 'Gowun Dodum';
    color: var(--navy-soft);
    font-size: 16px;
    margin-bottom: 24px;
  }
  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-box {
    background: white;
    border: 3px solid var(--navy);
    border-radius: 14px;
    padding: 14px 8px;
    text-align: center;
    box-shadow: 0 4px 0 var(--navy);
  }
  .stat-num {
    font-family: 'Fredoka';
    font-weight: 700;
    font-size: 28px;
    color: var(--primary);
    line-height: 1;
  }
  .stat-label {
    font-family: 'Gowun Dodum';
    font-size: 12px;
    color: var(--navy-soft);
    margin-top: 4px;
  }

  /* CONFETTI */
  .confetti {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 14px;
    pointer-events: none;
    animation: fall linear forwards;
    z-index: 9999;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  /* BADGE */
  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 10px;
    background: var(--yellow);
    border: 2px solid var(--navy);
    font-family: 'Fredoka';
    font-weight: 600;
    font-size: 12px;
    margin-left: 6px;
  }

  .controls-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .level-up-overlay {
    position: fixed;
    inset: 0;
    background: rgba(42, 53, 88, 0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9998;
    animation: cardIn 0.3s;
  }
  .level-up-overlay.show { display: flex; }
  .level-up-box {
    background: white;
    border-radius: 24px;
    padding: 40px 30px;
    text-align: center;
    border: 4px solid var(--navy);
    box-shadow: 0 10px 0 var(--navy);
    animation: popIn 0.5s cubic-bezier(.68,-0.55,.265,1.55);
    max-width: 340px;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }
  .level-up-num {
    font-family: 'Fredoka';
    font-weight: 700;
    font-size: 70px;
    color: var(--primary);
    line-height: 1;
    text-shadow: 4px 4px 0 var(--navy);
  }
  .level-up-title {
    font-family: 'Fredoka';
    font-weight: 700;
    font-size: 26px;
    color: var(--navy);
    margin: 10px 0 6px;
  }
